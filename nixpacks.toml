# nixpacks.toml — Railway build configuration
# Controls exactly how Railway builds and starts each service.
# Place this in your repo root.

[phases.setup]
nixPkgs = ["python311", "libsqlite"]

[phases.install]
cmds = [
  "pip install --upgrade pip",
  # Install CPU-only torch first — much smaller and faster to build
  "pip install torch==2.2.0 --index-url https://download.pytorch.org/whl/cpu",
  # Install everything else
  "pip install -r requirements.txt --no-deps --ignore-installed torch"
]
